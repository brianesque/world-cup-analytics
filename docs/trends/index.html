<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Liga Trends — Shot Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg:#040d08;--surface:#0b1a12;--surface2:#0f2218;--border:rgba(255,255,255,0.07);
  --text:#eaf2fb;--muted:#7e93b3;--accent:#3ddc84;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:16px;padding:12px 24px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.35);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:700;letter-spacing:.5px;color:var(--accent)}
.topbar a{color:var(--muted);font-size:12px;text-decoration:none}.topbar a:hover{color:var(--text)}
.topbar .sep{color:rgba(255,255,255,0.1);font-size:18px}

/* LAYOUT */
.main-grid{display:grid;grid-template-columns:300px 1fr;gap:0;height:calc(100vh - 49px)}

/* LEFT PANEL */
.left-panel{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.league-list{flex:1;overflow-y:auto;padding:8px}
.league-card{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background .15s;border:1px solid transparent;margin-bottom:4px}
.league-card:hover{background:var(--surface2)}
.league-card.active{background:var(--surface2);border-color:var(--border)}
.league-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.league-info{flex:1;min-width:0}
.league-name{font-size:13px;font-weight:600}
.league-country{font-size:11px;color:var(--muted)}
.league-kpi{font-size:11px;color:var(--muted);text-align:right}

/* RIGHT PANEL */
.right-panel{overflow-y:auto;display:flex;flex-direction:column;gap:0}

/* STICKY CONTROLS */
.sticky-controls{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 24px 12px;display:flex;flex-direction:column;gap:12px}

/* SEASON SLIDER */
.slider-row{display:flex;align-items:center;gap:16px}
.slider-label{font-size:12px;color:var(--muted);font-weight:500;white-space:nowrap}
.season-display{font-size:18px;font-weight:800;color:var(--accent);white-space:nowrap;min-width:90px}
.slider-wrap{flex:1}
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;height:4px}
.season-ticks{display:flex;justify-content:space-between;margin-top:4px}
.season-tick{font-size:9px;color:var(--muted)}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center;position:relative}
.kpi-val{font-size:18px;font-weight:800;line-height:1.1}
.kpi-lbl{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.kpi-delta{font-size:9px;margin-top:3px;font-weight:600}
.kpi-delta.up{color:#3ddc84}.kpi-delta.down{color:#ff3a5e}.kpi-delta.neu{color:var(--muted)}

/* SCROLLABLE CONTENT */
.scroll-content{padding:16px 24px;display:flex;flex-direction:column;gap:16px}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.chart-title{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.chart-wrap{position:relative;height:190px}
.chart-card.tall .chart-wrap{height:230px}

/* COMPARE BAR */
.compare-section{display:flex;flex-direction:column;gap:6px}
.compare-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.compare-bar{display:flex;gap:6px;flex-wrap:wrap}
.compare-btn{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s}
.compare-btn.active{color:#000;font-weight:700}

/* NO DATA */
.no-data{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:var(--muted);gap:8px;padding:24px}
.no-data code{color:var(--accent);font-size:12px;background:var(--surface);padding:6px 12px;border-radius:6px;display:block;margin:2px 0}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="topbar">
  <h1>⚽ Liga Trends</h1>
  <span class="sep">|</span>
  <a href="../shot-map/">← Shot Map WC</a>
  <span class="sep">|</span>
  <a href="../">← Inicio</a>
  <span style="flex:1"></span>
  <span style="font-size:11px;color:var(--muted)" id="data-status">Cargando…</span>
</div>

<div class="main-grid">
  <!-- LEFT: LEAGUE LIST -->
  <div class="left-panel">
    <div class="league-list" id="league-list"></div>
  </div>

  <!-- RIGHT: DASHBOARD -->
  <div class="right-panel" id="right-panel">
    <div class="no-data" id="no-data-msg">
      <div style="font-size:32px">📊</div>
      <p style="text-align:center;line-height:1.7">Para ver el dashboard ejecutá:<br>
        <code>python3 scripts/download_understat.py</code>
        <code>python3 scripts/build_league_trends.py</code>
      </p>
    </div>
  </div>
</div>

<script>
// ── GLOBALS ───────────────────────────────────────────────────────────────────
let DATA      = null;
let selLeague = 'EPL';
let selSeason = '2023';

const LEAGUE_COLORS = {
  EPL:'#00a8e8', La_liga:'#ff6900', Bundesliga:'#e8c320',
  Serie_A:'#1d9e54', Ligue_1:'#bf5af2', RFPL:'#ff3a5e'
};
const CHARTS = {};

// Which leagues are toggled ON in the comparison
let compareLeagues = new Set(Object.keys(LEAGUE_COLORS));

// ── CHART DEFAULTS ────────────────────────────────────────────────────────────
Chart.defaults.color        = '#7e93b3';
Chart.defaults.borderColor  = 'rgba(255,255,255,0.06)';
Chart.defaults.font.family  = '-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
Chart.defaults.font.size    = 11;

// ── UTILS ─────────────────────────────────────────────────────────────────────
function hexRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('data.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    DATA = await r.json();
    const nSeasons = Object.values(DATA.leagues).reduce((s,l)=>s+Object.keys(l.seasons||{}).length,0);
    document.getElementById('data-status').textContent =
      `${Object.keys(DATA.leagues).length} ligas · ${nSeasons} temporadas`;
    init();
  } catch(e) {
    document.getElementById('data-status').textContent = 'Sin datos';
    buildLeagueList(null);
  }
}

function init() {
  // Pick most recent season with data
  for (const s of [...DATA.all_seasons].reverse()) {
    if (Object.values(DATA.leagues).some(l => l.seasons?.[s])) { selSeason = s; break; }
  }
  // Only keep leagues that have data in compareLeagues
  compareLeagues = new Set(Object.keys(DATA.leagues).filter(k => DATA.leagues[k].seasons && Object.keys(DATA.leagues[k].seasons).length > 0));
  buildLeagueList(DATA);
  buildRightPanel();
}

// ── LEAGUE LIST ───────────────────────────────────────────────────────────────
function buildLeagueList(data) {
  const container = document.getElementById('league-list');
  const leagues = data ? Object.entries(data.leagues) : [
    ['EPL',{name:'Premier League',country:'Inglaterra',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',color:'#00a8e8',seasons:{}}],
    ['La_liga',{name:'La Liga',country:'España',flag:'🇪🇸',color:'#ff6900',seasons:{}}],
    ['Bundesliga',{name:'Bundesliga',country:'Alemania',flag:'🇩🇪',color:'#e8c320',seasons:{}}],
    ['Serie_A',{name:'Serie A',country:'Italia',flag:'🇮🇹',color:'#1d9e54',seasons:{}}],
  ];
  container.innerHTML = leagues.map(([key, l]) => {
    const s = l.seasons?.[selSeason];
    const kpi = s ? `${s.xg_per_shot.toFixed(3)} xG/tiro` : '—';
    return `<div class="league-card${key===selLeague?' active':''}" onclick="selectLeague('${key}')" id="lcard-${key}">
      <div class="league-dot" style="background:${l.color}"></div>
      <div class="league-info">
        <div class="league-name">${l.flag} ${l.name}</div>
        <div class="league-country">${l.country}</div>
      </div>
      <div class="league-kpi">${kpi}</div>
    </div>`;
  }).join('');
}

function selectLeague(key) {
  selLeague = key;
  document.querySelectorAll('.league-card').forEach(c=>c.classList.remove('active'));
  document.getElementById(`lcard-${key}`)?.classList.add('active');
  renderKPIs();
  renderSeasonCharts();
  renderTrendCharts();
}

// ── RIGHT PANEL ───────────────────────────────────────────────────────────────
function buildRightPanel() {
  if (!DATA) return;
  const panel = document.getElementById('right-panel');
  panel.innerHTML = `
    <!-- STICKY: slider + KPIs -->
    <div class="sticky-controls">
      <div class="slider-row">
        <span class="slider-label">Temporada</span>
        <span class="season-display" id="season-display">${selSeason}/${+selSeason+1}</span>
        <div class="slider-wrap">
          <input type="range" id="season-slider"
            min="0" max="${DATA.all_seasons.length-1}"
            value="${DATA.all_seasons.indexOf(selSeason)}"
            oninput="onSlider(this.value)"/>
          <div class="season-ticks">
            ${DATA.all_seasons.filter((_,i)=>i%2===0).map(s=>`<span class="season-tick">${s}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="kpi-strip" id="kpi-strip"></div>
    </div>

    <!-- SCROLLABLE CONTENT -->
    <div class="scroll-content">
      <!-- Compare toggle -->
      <div class="compare-section">
        <div class="compare-label">Comparar ligas</div>
        <div class="compare-bar" id="compare-bar"></div>
      </div>

      <!-- 4 trend line charts -->
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">xG por disparo</div>
          <div class="chart-wrap"><canvas id="chart-xg"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Distancia mediana al arco (m)</div>
          <div class="chart-wrap"><canvas id="chart-dist"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">% de disparos dentro del área</div>
          <div class="chart-wrap"><canvas id="chart-box"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Centralidad del disparo (0–1)</div>
          <div class="chart-wrap"><canvas id="chart-central"></canvas></div>
        </div>
      </div>

      <!-- Season-specific charts -->
      <div class="charts-grid">
        <div class="chart-card tall">
          <div class="chart-title" id="title-distrib">Distribución de distancias — ${selSeason}/${+selSeason+1}</div>
          <div class="chart-wrap"><canvas id="chart-distrib"></canvas></div>
        </div>
        <div class="chart-card tall">
          <div class="chart-title" id="title-sit">Situación del disparo — ${selSeason}/${+selSeason+1}</div>
          <div class="chart-wrap"><canvas id="chart-sit"></canvas></div>
        </div>
      </div>
    </div>`;

  renderCompareBar();
  renderKPIs();
  renderTrendCharts();
  renderSeasonCharts();
}

// ── SLIDER ────────────────────────────────────────────────────────────────────
function onSlider(idx) {
  selSeason = DATA.all_seasons[+idx];
  document.getElementById('season-display').textContent = `${selSeason}/${+selSeason+1}`;
  document.getElementById('title-distrib').textContent  = `Distribución de distancias — ${selSeason}/${+selSeason+1}`;
  document.getElementById('title-sit').textContent       = `Situación del disparo — ${selSeason}/${+selSeason+1}`;
  buildLeagueList(DATA);
  renderKPIs();
  renderTrendCharts();   // re-renders with updated season highlight
  renderSeasonCharts();
}

// ── COMPARE BAR ───────────────────────────────────────────────────────────────
function renderCompareBar() {
  if (!DATA) return;
  const bar = document.getElementById('compare-bar');
  if (!bar) return;
  bar.innerHTML = Object.entries(DATA.leagues).map(([key, l]) => {
    const on = compareLeagues.has(key);
    return `<button class="compare-btn${on?' active':''}"
      style="${on?`background:${l.color};border-color:${l.color}`:''}"
      onclick="toggleCompare('${key}')">${l.flag} ${l.name}</button>`;
  }).join('');
}

function toggleCompare(key) {
  if (compareLeagues.has(key) && compareLeagues.size > 1) compareLeagues.delete(key);
  else compareLeagues.add(key);
  renderCompareBar();
  renderTrendCharts();
}

// ── KPIs ─────────────────────────────────────────────────────────────────────
function renderKPIs() {
  if (!DATA) return;
  const strip = document.getElementById('kpi-strip');
  if (!strip) return;
  const l = DATA.leagues[selLeague];
  const s = l?.seasons?.[selSeason];
  const yr = +selSeason;

  // Find comparison baselines (5y and 10y ago)
  const s5  = l?.seasons?.[String(yr-5)];
  const s10 = l?.seasons?.[String(yr-10)];
  const base = s5 || s10;
  const baseLabel = s5 ? '5a' : (s10 ? '10a' : null);

  function delta(curr, prev, higherIsBetter=true) {
    if (!prev || curr == null) return '';
    const diff = curr - prev;
    const pct  = (diff / Math.abs(prev) * 100).toFixed(1);
    const good = higherIsBetter ? diff > 0 : diff < 0;
    const cls  = Math.abs(diff) < 0.0001 ? 'neu' : (good ? 'up' : 'down');
    const sign = diff > 0 ? '▲' : '▼';
    return `<div class="kpi-delta ${cls}">${sign} ${Math.abs(+pct)}% vs ${baseLabel}</div>`;
  }

  const na = '<span style="color:var(--muted)">—</span>';
  const color = LEAGUE_COLORS[selLeague] || '#3ddc84';

  strip.innerHTML = [
    { v: s ? s.shots.toLocaleString('es') : na,            lbl:'Tiros',         color:'var(--text)',  d:'' },
    { v: s ? s.goals.toLocaleString('es') : na,            lbl:'Goles',         color:'#3ddc84',      d: base && s ? delta(s.goals/s.shots*100, base.goals/base.shots*100) : '' },
    { v: s ? s.xg_per_shot.toFixed(3) : na,                lbl:'xG / tiro',     color:'#29b6f6',      d: base && s ? delta(s.xg_per_shot, base.xg_per_shot) : '' },
    { v: s ? (s.pct_in_box*100).toFixed(1)+'%' : na,       lbl:'% en área',     color:'var(--text)',  d: base && s ? delta(s.pct_in_box, base.pct_in_box) : '' },
    { v: s ? s.median_dist.toFixed(1)+' m' : na,           lbl:'Dist. mediana', color:'var(--text)',  d: base && s ? delta(s.median_dist, base.median_dist, false) : '' },
    { v: s ? s.avg_centrality.toFixed(3) : na,             lbl:'Centralidad',   color:'var(--text)',  d: base && s ? delta(s.avg_centrality, base.avg_centrality) : '' },
  ].map(({v,lbl,color:c,d}) =>
    `<div class="kpi-card">
      <div class="kpi-val" style="color:${c}">${v}</div>
      <div class="kpi-lbl">${lbl}</div>
      ${d}
    </div>`
  ).join('');
}

// ── TREND CHARTS ──────────────────────────────────────────────────────────────
function trendDataset(key, metricFn, seasons) {
  const l = DATA.leagues[key];
  if (!l?.seasons) return null;
  const color = LEAGUE_COLORS[key];
  const isSel = key === selLeague;
  return {
    label: l.name,
    data: seasons.map(s => { const d=l.seasons[s]; return d ? metricFn(d) : null; }),
    borderColor:       color,
    backgroundColor:   hexRgba(color, 0.12),
    borderWidth:       isSel ? 2.5 : 1.5,
    pointRadius:       seasons.map(s => s===selSeason ? 6 : (isSel ? 3 : 1.5)),
    pointBackgroundColor: seasons.map(s => s===selSeason ? '#fff' : color),
    pointBorderColor:  seasons.map(s => s===selSeason ? color : 'transparent'),
    pointBorderWidth:  2,
    tension: 0.3,
    spanGaps: true,
  };
}

function renderTrendCharts() {
  if (!DATA) return;
  const seasons = DATA.all_seasons;
  const keys    = [...compareLeagues];

  const configs = [
    { id:'chart-xg',      metric: d=>d.xg_per_shot,                   fmt: v=>`${v.toFixed(3)} xG`,  yoyFmt: d=>`${d>0?'+':''}${(d*1000).toFixed(1)}‰` },
    { id:'chart-dist',    metric: d=>d.median_dist,                    fmt: v=>`${v.toFixed(1)} m`,    yoyFmt: d=>`${d>0?'+':''}${d.toFixed(2)} m` },
    { id:'chart-box',     metric: d=>+(d.pct_in_box*100).toFixed(2),   fmt: v=>`${v.toFixed(1)}%`,     yoyFmt: d=>`${d>0?'+':''}${d.toFixed(1)} pp` },
    { id:'chart-central', metric: d=>+d.avg_centrality.toFixed(4),     fmt: v=>v.toFixed(3),           yoyFmt: d=>`${d>0?'+':''}${d.toFixed(3)}` },
  ];

  configs.forEach(({id, metric, fmt, yoyFmt}) => {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    if (CHARTS[id]) { CHARTS[id].destroy(); delete CHARTS[id]; }

    const datasets = keys.map(k=>trendDataset(k,metric,seasons)).filter(Boolean);

    CHARTS[id] = new Chart(canvas, {
      type: 'line',
      data: { labels: seasons.map(s=>`${s}/${+s+1}`), datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: { display: datasets.length>1, position:'bottom', labels:{boxWidth:10,padding:6,font:{size:9}} },
          tooltip: {
            backgroundColor:'#0f2218', borderColor:'rgba(255,255,255,0.12)', borderWidth:1,
            callbacks: {
              title: ctx => {
                const idx = ctx[0].dataIndex;
                return `${seasons[idx]}/${+seasons[idx]+1}`;
              },
              label: ctx => {
                const v    = ctx.parsed.y;
                const prev = ctx.dataset.data[ctx.dataIndex-1];
                if (v == null) return ` ${ctx.dataset.label}: —`;
                const yoy = (prev!=null && prev!==0) ? yoyFmt(v-prev) : null;
                const yoyStr = yoy ? `  (${yoy} YoY)` : '';
                // Highlight selected season
                const isSel = seasons[ctx.dataIndex] === selSeason;
                return ` ${isSel?'▶ ':''}${ctx.dataset.label}: ${fmt(v)}${yoyStr}`;
              },
            },
          },
        },
        scales: {
          x: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{maxRotation:45,font:{size:9}} },
          y: { grid:{color:'rgba(255,255,255,0.04)'}, beginAtZero:false },
        },
      },
    });
  });
}

// ── SEASON CHARTS ─────────────────────────────────────────────────────────────
function renderSeasonCharts() {
  if (!DATA) return;
  const l     = DATA.leagues[selLeague];
  const s     = l?.seasons?.[selSeason];
  const color = LEAGUE_COLORS[selLeague] || '#3ddc84';

  // Distance distribution
  const dc = document.getElementById('chart-distrib');
  if (dc) {
    if (CHARTS['chart-distrib']) { CHARTS['chart-distrib'].destroy(); delete CHARTS['chart-distrib']; }
    CHARTS['chart-distrib'] = new Chart(dc, {
      type: 'bar',
      data: {
        labels: s ? (DATA.dist_labels || s.dist_labels || []) : [],
        datasets: [{ label:'Disparos', data: s ? s.dist_bins : [],
          backgroundColor: hexRgba(color, 0.65), borderColor: color, borderWidth:1, borderRadius:3 }],
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: {
          legend:{display:false},
          tooltip:{
            backgroundColor:'#0f2218',borderColor:'rgba(255,255,255,0.12)',borderWidth:1,
            callbacks:{label:ctx=>` ${ctx.parsed.y.toLocaleString('es')} disparos`},
          },
        },
        scales:{
          x:{grid:{color:'rgba(255,255,255,0.04)'},title:{display:true,text:'metros',color:'#7e93b3',font:{size:10}}},
          y:{grid:{color:'rgba(255,255,255,0.04)'},beginAtZero:true},
        },
      },
    });
  }

  // Situation doughnut
  const sc = document.getElementById('chart-sit');
  if (sc) {
    if (CHARTS['chart-sit']) { CHARTS['chart-sit'].destroy(); delete CHARTS['chart-sit']; }
    if (s?.by_situation) {
      const SIT_COLORS = {OpenPlay:'#3ddc84',FromCorner:'#29b6f6',DirectFreekick:'#ff6900',SetPiece:'#bf5af2',Penalty:'#ff3a5e'};
      const SIT_LABELS = {OpenPlay:'Juego abierto',FromCorner:'Córner',DirectFreekick:'Tiro libre',SetPiece:'Pelota parada',Penalty:'Penal'};
      const entries = Object.entries(s.by_situation);
      CHARTS['chart-sit'] = new Chart(sc, {
        type:'doughnut',
        data:{
          labels: entries.map(([k])=>SIT_LABELS[k]||k),
          datasets:[{data:entries.map(([,v])=>v),
            backgroundColor:entries.map(([k])=>SIT_COLORS[k]||'#7e93b3'),
            borderColor:'#040d08',borderWidth:2}],
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{
            legend:{position:'right',labels:{boxWidth:10,padding:6,font:{size:9}}},
            tooltip:{
              backgroundColor:'#0f2218',borderColor:'rgba(255,255,255,0.12)',borderWidth:1,
              callbacks:{label:ctx=>{
                const total=ctx.dataset.data.reduce((a,b)=>a+b,0);
                return ` ${ctx.parsed.toLocaleString('es')} (${(ctx.parsed/total*100).toFixed(1)}%)`;
              }},
            },
          },
        },
      });
    }
  }
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
